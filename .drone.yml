- name: odc-scan

  image: owasp/dependency-check-action:latest

  commands:

    - mkdir -p reports

    - /usr/share/dependency-check/bin/dependency-check.sh --project "$DRONE_REPO" --scan /drone/src --format HTML --out reports --disableOssIndex --enableExperimental --noupdate || true

    - ls -la reports
    - cat reports/dependency-check-report.html

- name: publish-odc-report-to-github
  image: alpine/git
  environment:
    DEPLOYMENT_TOKEN:
      from_secret: DEPLOYMENT_TOKEN
    DEPLOY2:
      from_secret: deploy2
  commands:
    - test -f reports/dependency-check-report.html || (echo "ODC report not found" && exit 1)
    - export REPORT_NAME="dependency-check-${DRONE_REPO_NAME}-${DRONE_BUILD_NUMBER}.html"
    - git clone https://x-access-token:$DEPLOY2@github.com/Houwayda-Gouia/documentations.git docs-repo
    - mkdir -p docs-repo/odc-reports
    - cp reports/dependency-check-report.html "docs-repo/odc-reports/$REPORT_NAME"
    - cd docs-repo
    - git config user.name "Houwayda-Gouia"
    - git config user.email "houwaydagouiaa@gmail.com"
    - git add odc-reports/
    - git commit -m "Add ODC report for $DRONE_REPO@$DRONE_COMMIT_SHA" || echo "No changes to commit"
    - git push
 
 
 
- name: set-env
  image: node:18
  environment:
    DRONE_BRANCH: ${DRONE_BRANCH}
    DRONE_TAG: ${DRONE_TAG}
    DRONE_COMMIT_SHA: ${DRONE_COMMIT_SHA}
    

   

    DRONE_IMAGE_NAME:
      from_secret: DRONE_IMAGE_NAME
    DRONE_REGISTRY_DOMAIN:
      from_secret: DRONE_REGISTRY_DOMAIN

    DRONE_RELEASE_REPO_DEV:
      from_secret: DRONE_RELEASE_REPO_DEV
    DRONE_PROJECT_REPO_DEV:
      from_secret: DRONE_PROJECT_REPO_DEV
    DRONE_HELM_PROJECT_DEV:
      from_secret: DRONE_HELM_PROJECT_DEV
    DRONE_REGISTRY_NAME_DEV:
      from_secret: DRONE_REGISTRY_NAME_DEV
    ACR_USERNAME_DEV:
      from_secret: ACR_USERNAME_DEV
    ACR_PASSWORD_DEV:
      from_secret: ACR_PASSWORD_DEV
    DRONE_HELM_VALUES_SECTION_NAME_DEV:
      from_secret: DRONE_HELM_VALUES_SECTION_NAME_DEV

    DRONE_RELEASE_REPO_STG:
      from_secret: DRONE_RELEASE_REPO_STG
    DRONE_PROJECT_REPO_STG:
      from_secret: DRONE_PROJECT_REPO_STG
    DRONE_HELM_PROJECT_STG:
      from_secret: DRONE_HELM_PROJECT_STG
    DRONE_REGISTRY_NAME_STG:
      from_secret: DRONE_REGISTRY_NAME_STG
    ACR_USERNAME_STG:
      from_secret: ACR_USERNAME_STG
    ACR_PASSWORD_STG:
      from_secret: ACR_PASSWORD_STG

    DRONE_RELEASE_REPO_PRD:
      from_secret: DRONE_RELEASE_REPO_PRD
    DRONE_PROJECT_REPO_PRD:
      from_secret: DRONE_PROJECT_REPO_PRD
    DRONE_HELM_PROJECT_PRD:
      from_secret: DRONE_HELM_PROJECT_PRD
    DRONE_REGISTRY_NAME_PRD:
      from_secret: DRONE_REGISTRY_NAME_PRD
    ACR_USERNAME_PRD:
      from_secret: ACR_USERNAME_PRD
    ACR_PASSWORD_PRD:
      from_secret: ACR_PASSWORD_PRD

  commands:
  - |-
      
        cat <<'NODE' | node
        const fs = require('fs');

        const env = process.env;
        const outputs = {};
        const NL = String.fromCharCode(10);

        function req(k) {
          const v = env[k];
          if (!v) {
            console.error('Missing env var: ' + k);
            process.exit(1);
          }
          return v;
        }

        if (env.DRONE_BRANCH === 'dev') {
          outputs.environment = 'development';
          outputs.environment_display = 'Dev';

          outputs.release_repo = req('DRONE_RELEASE_REPO_DEV');
          outputs.kustomize_folder = req('DRONE_PROJECT_REPO_DEV');

          outputs.helm_folder = req('DRONE_HELM_PROJECT_DEV');
          outputs.helm_release_repo = req('DRONE_RELEASE_REPO_DEV');
          outputs.helm_values_section_name = req('DRONE_HELM_VALUES_SECTION_NAME_DEV');

          outputs.acr_name = req('DRONE_REGISTRY_DOMAIN') + '.' + req('ACR_USERNAME_DEV') ;
          outputs.acr_username = req('ACR_USERNAME_DEV');
          outputs.acr_password = req('ACR_PASSWORD_DEV');
          outputs.acr_domain = req('DRONE_REGISTRY_DOMAIN');
          outputs.docker_tag = outputs.acr_domain + '/' + outputs.acr_username + '/' + req('DRONE_IMAGE_NAME') + ':' + req('DRONE_COMMIT_SHA');


          outputs.helm_tag = req('DRONE_COMMIT_SHA');

        } else if (env.DRONE_TAG && env.DRONE_TAG.includes('-rc')) {
          outputs.environment = 'staging';
          outputs.environment_display = 'Staging';

          outputs.release_repo = req('DRONE_RELEASE_REPO_STG');
          outputs.kustomize_folder = req('DRONE_PROJECT_REPO_STG');

          outputs.helm_folder = req('DRONE_HELM_PROJECT_STG');
          outputs.helm_release_repo = req('DRONE_RELEASE_REPO_STG');
          outputs.helm_values_section_name = 'staging';

          outputs.acr_name = req('DRONE_REGISTRY_NAME_STG') + '.' + req('DRONE_REGISTRY_DOMAIN');
          outputs.acr_username = req('ACR_USERNAME_STG');
          outputs.acr_password = req('ACR_PASSWORD_STG');

          outputs.docker_tag = outputs.acr_name + '/' + req('DRONE_IMAGE_NAME') + ':' + req('DRONE_TAG');
          outputs.helm_tag = req('DRONE_TAG');

        } else if (env.DRONE_TAG && env.DRONE_TAG.includes('-avaxia')) {
          outputs.environment = 'production';
          outputs.environment_display = 'Production';

          outputs.release_repo = req('DRONE_RELEASE_REPO_PRD');
          outputs.kustomize_folder = req('DRONE_PROJECT_REPO_PRD');

          outputs.helm_folder = req('DRONE_HELM_PROJECT_PRD');
          outputs.helm_release_repo = req('DRONE_RELEASE_REPO_PRD');
          outputs.helm_values_section_name = 'production';

          outputs.acr_name = req('DRONE_REGISTRY_NAME_PRD') + '.' + req('DRONE_REGISTRY_DOMAIN');
          outputs.acr_username = req('ACR_USERNAME_PRD');
          outputs.acr_password = req('ACR_PASSWORD_PRD');

          outputs.docker_tag = outputs.acr_name + '/' + req('DRONE_IMAGE_NAME') + ':' + req('DRONE_TAG');
          outputs.helm_tag = req('DRONE_TAG');

        } else {
          console.error('Unknown environment. Expected: branch dev OR tag with -rc OR tag with -avaxia');
          process.exit(1);
        }

        fs.writeFileSync(
          '.outputs',
          Object.entries(outputs).map(([k, v]) => k + '=' + v).join(NL)
        );

        console.log('=== .outputs ===');
        console.log(fs.readFileSync('.outputs', 'utf8'));
        NODE



- name: docker-build-push
  image: gcr.io/kaniko-project/executor:debug
  environment:
    DOCKER_CONFIG: /kaniko/.docker
  commands:
    - export $(cat .outputs | xargs)
    - mkdir -p /kaniko/.docker
    - |-
      cat <<EOF > /kaniko/.docker/config.json
      {
        "auths": {
          "https://index.docker.io/v1/": {
            "username": "$acr_username",
            "password": "$acr_password"
          }
        }
      }
      EOF
    - /kaniko/executor --context . --dockerfile Dockerfile --destination "$docker_tag"

- name: trivy-scan
  image: aquasec/trivy:0.69.3
  commands:
    - mkdir -p reports
    - wget -O trivy-html.tpl https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl
    - export $(cat .outputs | xargs)
    - export REPORT_FILE="reports/trivy-report-${DRONE_REPO_NAME}-${DRONE_BUILD_NUMBER}.html"
    - |-
      trivy image --format template \
        --template "@trivy-html.tpl" \
        --output "$REPORT_FILE" \
        --severity CRITICAL,HIGH \
        --ignore-unfixed \
        "$docker_tag"
    - 'echo "Generated report: $REPORT_FILE"'
    - ls -lah reports/

- name: publish-trivy-report-to-github
  image: alpine/git
  environment:
    DEPLOY2:
      from_secret: deploy2
  commands:
    - test -n "$DEPLOY2" || (echo "DEPLOY2 secret is empty or missing" && exit 1)
    - test -f "reports/trivy-report-${DRONE_REPO_NAME}-${DRONE_BUILD_NUMBER}.html" || (echo "Trivy report not found" && exit 1)
    - export REPORT_NAME="trivy-report-${DRONE_REPO_NAME}-${DRONE_BUILD_NUMBER}.html"
    - git clone https://x-access-token:$DEPLOY2@github.com/Houwayda-Gouia/documentations.git docs-repo
    - mkdir -p docs-repo/trivy-reports
    - cp "reports/trivy-report-${DRONE_REPO_NAME}-${DRONE_BUILD_NUMBER}.html" "docs-repo/trivy-reports/${REPORT_NAME}"
    - cd docs-repo
    - git config user.name "Houwayda-Gouia"
    - git config user.email "houwaydagouiaa@gmail.com"
    - git remote set-url origin https://x-access-token:$DEPLOY2@github.com/Houwayda-Gouia/documentations.git
    - git add trivy-reports/
    - git commit -m "Add Trivy report for ${DRONE_REPO}@${DRONE_COMMIT_SHA}" || echo "No changes to commit"
    - git push origin main

    

- name: helm-release
  image: alpine/git
 
  environment:
    GITHUBTOKEN:
      from_secret: DEPLOYMENT_TOKEN
      
  commands:    
    - export $(cat .outputs | xargs)
    - export helm_tag=$DRONE_COMMIT_SHA
    - git clone https://$GITHUBTOKEN@github.com/$helm_release_repo.git helm-release
    - cd helm-release/$helm_folder
    - git config user.name "Houwayda-Gouia"
    - git config user.email "houwaydagouiaa@gmail.com"
    - sed -i "/^$helm_values_section_name:/,/tag:/ s/\(tag:\).*/\1 $helm_tag/" values.yaml
    - git add values.yaml
    - git commit -m "Deploy to $environment - $docker_tag" || echo "No changes to commit"
    - git push 

