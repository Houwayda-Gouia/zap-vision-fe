- name: trivy-scan
  image: aquasec/trivy:0.69.3
  commands:
    - mkdir -p reports
    - wget -O trivy-html.tpl https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl
    - export $(cat .outputs | xargs)
    - export REPORT_FILE="reports/trivy-report-${DRONE_REPO_NAME}-${DRONE_BUILD_NUMBER}.html"
    - |-
      trivy image --format template \
        --template "@trivy-html.tpl" \
        --output "$REPORT_FILE" \
        --severity CRITICAL,HIGH \
        --ignore-unfixed \
        "$docker_tag"
    - 'echo "Generated report: $REPORT_FILE"'
    - ls -lah reports/

- name: upload-zap-report-to-azure
  image: mcr.microsoft.com/azure-cli:latest
  environment:
    AZURE_STORAGE_ACCOUNT_NAME:
      from_secret: AZURE_STORAGE_ACCOUNT_NAME
    AZURE_STORAGE_ACCOUNT_KEY:
      from_secret: AZURE_STORAGE_ACCOUNT_KEY
    AZURE_STORAGE_CONTAINER_NAME:
      from_secret: AZURE_CONTAINER_NAME
  commands:
    - export blob_name=$(echo "$REPORT_FILE" | sed 's/:/_/g')
    - az storage blob upload \
        --account-name "$AZURE_STORAGE_ACCOUNT_NAME" \
        --account-key "$AZURE_STORAGE_ACCOUNT_KEY" \
        --container-name "$AZURE_STORAGE_CONTAINER_NAME" \
        --name "$blob_name" \
        --file "$REPORT_FILE"

    
- name: helm-release
  image: alpine/git
 
  environment:
    GITHUBTOKEN:
      from_secret: DEPLOYMENT_TOKEN
      
  commands:    
    - export $(cat .outputs | xargs)
    - export helm_tag=$DRONE_COMMIT_SHA
    - git clone https://$GITHUBTOKEN@github.com/$helm_release_repo.git helm-release
    - cd helm-release/$helm_folder
    - git config user.name "Houwayda-Gouia"
    - git config user.email "houwaydagouiaa@gmail.com"
    - sed -i "/^$helm_values_section_name:/,/tag:/ s/\(tag:\).*/\1 $helm_tag/" values.yaml
    - git add values.yaml
    - git commit -m "Deploy to $environment - $docker_tag" || echo "No changes to commit"
    - git push 
 
